          - button "What is your design process? +" [expanded] [ref=e713] [cursor=pointer]:
            - generic [ref=e714]: What is your design process?
            - generic [ref=e715]: +
          - paragraph [ref=e717]: "My design process involves four key phases: research, design, prototype, and test. In research, I gather deep insights about users through interviews, surveys, and competitive analysis. In design, I create wireframes and high-fidelity visual designs grounded in those insights. In prototype, I build interactive models that simulate the real product experience. In test, I collect user feedback to validate decisions and continually refine the solution until it truly works."
        - generic [ref=e718]:
          - button "What tools and software do you use for UX design? +" [ref=e719] [cursor=pointer]:
            - generic [ref=e720]: What tools and software do you use for UX design?
            - generic [ref=e721]: +
          - paragraph [ref=e722]: I use Figma for design, prototyping, and design system management. Notion keeps documentation, research notes, and project plans organized. Hotjar and FullStory provide user analytics and session recordings. Framer powers interactive prototyping and production-quality web development. Miro facilitates remote workshops and journey mapping. The exact toolkit adapts to each project's needs, always prioritizing what best serves the work.
        - generic [ref=e723]:
          - button "How do you measure the success of your UX designs? +" [ref=e724] [cursor=pointer]:
            - generic [ref=e725]: How do you measure the success of your UX designs?
            - generic [ref=e726]: +
          - paragraph [ref=e727]: Success is measured through a combination of qualitative and quantitative signals. I conduct moderated usability testing sessions to observe real users interacting with designs. Analytics data tracks task completion rates, drop-off points, and engagement patterns. User satisfaction scores (NPS, SUS, CSAT) provide benchmarks. Ultimately, the north star is whether the design moves meaningful business metrics — conversion rates, retention, and activation — while genuinely improving user satisfaction.
        - generic [ref=e728]:
          - button "Do you work with early-stage startups or established companies? +" [ref=e729] [cursor=pointer]:
            - generic [ref=e730]: Do you work with early-stage startups or established companies?
            - generic [ref=e731]: +
          - paragraph [ref=e732]: "Both. With early-stage startups, the focus is often on rapid validation — getting to a testable product quickly without over-designing. With established companies, the work tends to involve deeper design systems, complex workflows, and scaling existing products. In both cases, the goal is the same: solve the right problem in the most user-centered, business-aligned way possible."
